<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Ventas + CRM + Inventario</title>
    
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Vue Router CDN -->
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Barra de Navegación -->
        <nav>
            <router-link to="/">📊 Dashboard</router-link>
            <router-link to="/usuarios">👥 Usuarios</router-link>
            <router-link to="/productos">📦 Productos</router-link>
            <router-link to="/ventas">💰 Ventas</router-link>
            <router-link to="/inventario">🏭 Inventario</router-link>
        </nav>
        
        <!-- Contenido Principal -->
        <div class="container">
            <router-view @notificar="mostrarNotificacion"></router-view>
        </div>
        
        <!-- Sistema de Notificaciones -->
        <div v-if="notificacion.mostrar" 
             :class="'alert alert-' + notificacion.tipo"
             class="notification-toast">
            {{ notificacion.mensaje }}
            <button @click="notificacion.mostrar = false" class="close-btn">✕</button>
        </div>
    </div>

    <!-- ORDEN CORRECTO DE CARGA -->
    <!-- 1. Configuración -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    
    <!-- 2. Componentes Base (sin dependencias) -->
    <script src="components/usuarios/UsuarioForm.js"></script>
    <script src="components/productos/ProductoForm.js"></script>
    <script src="components/inventario/InventarioForm.js"></script>
    
    <!-- 3. Componentes Lista (dependen de los Forms) -->
    <script src="components/usuarios/UsuarioList.js"></script>
    <script src="components/productos/ProductoList.js"></script>
    <script src="components/inventario/InventarioList.js"></script>
    
    <!-- 4. Componentes de Venta -->
    <script src="components/ventas/VentaForm.js"></script>
    <script src="components/ventas/VentaList.js"></script>
    
    <!-- 5. Dashboard -->
    <script src="components/dashboard/Dashboard.js"></script>
    
    <!-- 6. Router y App (SIEMPRE al final) -->
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
